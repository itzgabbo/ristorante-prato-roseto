<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Menu - Ristorante Prato Roseto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-container">
                <img src="../logo.png" alt="Prato Roseto Logo" class="logo">
                <h2>Menu</h2>
            </div>
            
            <div class="user-info">
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="user-details">
                    <span class="user-name">Admin</span>
                    <a href="#" id="logout" class="logout-link">Esci</a>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchMenu" placeholder="Cerca nel menu...">
                </div>
            </header>
            
            <div class="content">
                <div class="page-header">
                    <h1>Gestione Menu</h1>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn" id="addCategoryBtn">
                            <i class="fas fa-folder-plus"></i> Aggiungi Categoria
                        </button>
                        <button class="btn" id="addDishBtn">
                            <i class="fas fa-plus"></i> Aggiungi Piatto
                        </button>
                    </div>
                </div>
                
                <div class="menu-container">
                    <div class="menu-categories">
                        <div class="category-tabs" id="categoryTabs">
                            <!-- Categorie caricate dinamicamente -->
                        </div>
                        
                        <div class="menu-items" id="menuItems">
                            <!-- I piatti verranno caricati qui dinamicamente -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modale Aggiungi/Modifica Piatto -->
    <div class="modal" id="dishModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Aggiungi Nuovo Piatto</h2>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="dishForm">
                    <div class="form-group">
                        <label for="dishName">Nome Piatto *</label>
                        <input type="text" id="dishName" name="name" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="dishCategory">Categoria *</label>
                        <select id="dishCategory" name="category" class="form-control" required>
                            <option value="">Seleziona una categoria</option>
                            <option value="antipasti">Antipasti</option>
                            <option value="primi">Primi Piatti</option>
                            <option value="secondi">Secondi</option>
                            <option value="contorni">Contorni</option>
                            <option value="pizze">Pizze</option>
                            <option value="dessert">Dessert</option>
                            <option value="bevande">Bevande</option>
                            <option value="vini">Vini</option>
                            <option value="birre">Birre</option>
                        </select>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group" style="flex: 1;">
                            <label for="dishPrice">Prezzo (€) *</label>
                            <input type="number" id="dishPrice" name="price" class="form-control" min="0" step="0.01" required>
                        </div>
                        
                        <div class="form-group" style="flex: 1;">
                            <label for="dishOrder">Ordinamento</label>
                            <input type="number" id="dishOrder" name="order" class="form-control" min="0" value="0">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="dishDescription">Descrizione</label>
                        <textarea id="dishDescription" name="description" class="form-control" rows="3"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Immagine del piatto</label>
                        <div style="position: relative; display: inline-block;">
                            <div class="image-upload" id="imageUpload" style="border: 2px dashed #ccc; padding: 2rem; text-align: center; cursor: pointer; border-radius: 8px; margin-bottom: 0.5rem;">
                                <i class="fas fa-cloud-upload-alt fa-2x" style="color: #ccc;"></i>
                                <p style="margin-top: 0.5rem; color: #666;">Trascina un'immagine qui o clicca per selezionare</p>
                                <img id="imagePreview" class="preview-image" style="max-width: 200px; margin-top: 1rem; display: none;" alt="Anteprima immagine">
                                <input type="file" id="dishImage" accept="image/*" style="display: none;">
                            </div>
                            <button type="button" id="removeImageBtn" style="position: absolute; top: 0.5rem; right: 0.5rem; background: #f44336; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; display: none;">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="dishIsAvailable" checked>
                            Piatto disponibile
                        </label>
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="dishShowImage" checked>
                            Mostra foto nel menu pubblico
                        </label>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn btn-outline" id="cancelDish">Annulla</button>
                        <button type="submit" class="btn" id="saveDish">Salva Piatto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modale Aggiungi/Modifica Categoria -->
    <div class="modal" id="categoryModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="categoryModalTitle">Aggiungi Nuova Categoria</h2>
                <button class="close-modal" id="closeCategoryModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="categoryForm">
                    <div class="form-group">
                        <label for="categoryName">Nome Categoria *</label>
                        <input type="text" id="categoryName" name="name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="categoryOrder">Ordinamento</label>
                        <input type="number" id="categoryOrder" name="order" class="form-control" min="0" value="0">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-outline" id="cancelCategory">Annulla</button>
                        <button type="submit" class="btn">Salva Categoria</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Indicatore di caricamento -->
    <div id="loadingIndicator" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
        <div style="background: white; padding: 2rem; border-radius: 8px;">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p style="margin-top: 1rem;">Caricamento...</p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
