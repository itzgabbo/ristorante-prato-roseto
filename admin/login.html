<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Amministrazione - Prato Roseto</title>
    <link rel="icon" type="image/png" href="../logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #E1A74A;
            --secondary-color: #2c3e50;
            --light-gray: #f5f5f5;
            --dark-gray: #333;
            --error-color: #e74c3c;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--light-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: url('../fotosala.png');
            background-size: cover;
            background-position: center;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(5px);
        }
        
        .logo {
            width: 120px;
            margin-bottom: 1.5rem;
        }
        
        h1 {
            color: var(--secondary-color);
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--secondary-color);
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }
        
        .btn:hover {
            background-color: #d1943a;
        }
        
        .error-message {
            color: var(--error-color);
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        
        .forgot-password {
            display: block;
            margin-top: 1rem;
            color: var(--secondary-color);
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .forgot-password:hover {
            text-decoration: underline;
        }
        
        /* Stile per il messaggio di errore */
        #errorMessage {
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
            background-color: #ffebee;
            border-left: 4px solid #f44336;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="../logo.png" alt="Prato Roseto Logo" class="logo">
        <h1>Accesso Amministrazione</h1>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div id="error-message" class="error-message" style="color: var(--error-color); margin-bottom: 1rem; display: none;"></div>
            <div id="loading-indicator" style="display: none; margin-bottom: 1rem;">
                <i class="fas fa-spinner fa-spin"></i> Accesso in corso...
            </div>
            
            <button type="submit" class="btn">
                <span>Accedi</span>
            </button>
        </form>
        
        <script src="js/auth.js"></script>
        <script src="js/login.js"></script>
    </div>
</body>
</html>
